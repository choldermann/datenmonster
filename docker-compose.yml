version: "3.9"

services:
  backend:
    image: ghcr.io/choldermann/datenmonster-backend:latest
    pull_policy: always
    container_name: datenmonster-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - datenmonster-data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DATABASE_URL=sqlite:///./uploads/datenmonster.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5174}
      - PLUGIN_MANAGER_URL=http://plugin-manager:9001
      - REDIS_URL=redis://redis:6379
      - OLLAMA_BASE_URL=http://ollama:11434
      - UPDATER_URL=http://updater:9000
    depends_on:
      - redis
    networks:
      - datenmonster
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: datenmonster-redis
    networks:
      - datenmonster
    restart: unless-stopped

  plugin-manager:
    image: ghcr.io/choldermann/datenmonster-plugin-manager:latest
    pull_policy: always
    container_name: datenmonster-plugin-manager
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - plugin-manager-data:/data
    environment:
      - PLUGIN_NETWORK=datenmonster
      - REDIS_URL=redis://redis:6379
    networks:
      - datenmonster
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: datenmonster-ollama
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - datenmonster
    restart: unless-stopped
    # GPU-Passthrough optional – auskommentieren wenn keine NVIDIA-GPU vorhanden:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  frontend:
    image: ghcr.io/choldermann/datenmonster-frontend:latest
    pull_policy: always
    container_name: datenmonster-frontend
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - datenmonster
    restart: unless-stopped

  updater:
    image: ghcr.io/choldermann/datenmonster-updater:latest
    build: ./updater
    container_name: datenmonster-updater
    expose:
      - "9000"
    environment:
      - COMPOSE_FILE=/project/docker-compose.yml
      - COMPOSE_PROJECT_NAME=datenmonster
      - GITHUB_REPO=choldermann/datenmonster
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
    networks:
      - datenmonster
    restart: unless-stopped

volumes:
  datenmonster-data:
  plugin-manager-data:
  ollama-data:

networks:
  datenmonster:
    name: datenmonster
