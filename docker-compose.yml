version: "3.9"

services:
  backend:
    build: ./backend
    container_name: datenmonster-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - datenmonster-data:/app/uploads
    environment:
      - SECRET_KEY=change-this-in-production-please
      - DATABASE_URL=sqlite:///./uploads/datenmonster.db
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: datenmonster-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  datenmonster-data:
