version: "3.9"

services:
  backend:
    build: ./backend
    container_name: datenmonster-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000  # kein --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - datenmonster-data:/app/uploads
    environment:
      # ┌─────────────────────────────────────────────────────────────────┐
      # │  SICHERHEITSHINWEIS – vor dem ersten Start:                     │
      # │  cp .env.example .env                                           │
      # │  echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env             │
      # │  Die .env-Datei niemals ins Repository committen!               │
      # └─────────────────────────────────────────────────────────────────┘
      - SECRET_KEY=${SECRET_KEY}
      # ADMIN_PASSWORD: ohne Wert wird ein Zufallspasswort generiert und
      # einmalig in den Container-Logs angezeigt. Danach in .env setzen.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DATABASE_URL=sqlite:///./uploads/datenmonster.db
      - ALLOWED_ORIGINS=http://localhost:5174,http://localhost:3000
      - PLUGIN_MANAGER_URL=http://plugin-manager:9001
    networks:
      - datenmonster
    restart: unless-stopped

  plugin-manager:
    build: ./plugin-manager
    container_name: datenmonster-plugin-manager
    ports:
      - "9001:9001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - plugin-manager-data:/data
    environment:
      - PLUGIN_NETWORK=datenmonster
    networks:
      - datenmonster
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: datenmonster-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - datenmonster
    restart: unless-stopped

volumes:
  datenmonster-data:
  plugin-manager-data:

networks:
  datenmonster:
    name: datenmonster
