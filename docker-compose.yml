version: "3.9"

services:
  backend:
    build: ./backend
    container_name: datenmonster-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000  # kein --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - datenmonster-data:/app/uploads
    environment:
      # ┌─────────────────────────────────────────────────────────────────┐
      # │  SICHERHEITSHINWEIS – vor dem ersten Start:                     │
      # │  cp .env.example .env                                           │
      # │  echo "SECRET_KEY=$(openssl rand -hex 32)" >> .env             │
      # │  Die .env-Datei niemals ins Repository committen!               │
      # └─────────────────────────────────────────────────────────────────┘
      - SECRET_KEY=${SECRET_KEY}
      # ADMIN_PASSWORD: ohne Wert wird ein Zufallspasswort generiert und
      # einmalig in den Container-Logs angezeigt. Danach in .env setzen.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DATABASE_URL=sqlite:///./uploads/datenmonster.db
      - ALLOWED_ORIGINS=http://localhost:5174,http://localhost:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: datenmonster-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  datenmonster-data:
