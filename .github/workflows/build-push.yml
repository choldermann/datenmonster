name: Build & Push to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
          - name: frontend
            context: ./frontend
          - name: plugin-manager
            context: ./plugin-manager
          - name: updater
            context: ./updater

    steps:
      - uses: actions/checkout@v4

      - name: Extract metadata
        id: meta
        run: |
          echo "commit_msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "app_version=$(cat VERSION)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build image name and tags
        id: tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/datenmonster-${{ matrix.name }}"
          TAGS="${IMAGE}:latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS="${TAGS},${IMAGE}:${{ github.ref_name }}"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            ${{ matrix.build_args || '' }}
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            git.commit.message=${{ steps.meta.outputs.commit_msg }}
